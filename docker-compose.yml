version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: VehicleInsurance.API/Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - db
      - mailhog
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    volumes:
      - ./Emails:/app/Emails

  frontend:
    build:
      context: ./vehicle-insurance-ui
    ports:
      - "3000:3000"

  db:
    image: mcr.microsoft.com/mssql/server:latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Your_password123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  sql_data: