version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: VehicleInsurance.API/Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - ASPNETCORE_URLS=http://+:5000

  frontend:
    build:
      context: ./vehicle-insurance-ui
    ports:
      - "3000:3000"

  db:
    image: mcr.microsoft.com/mssql/server:latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Your_password123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data: